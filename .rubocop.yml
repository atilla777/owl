plugins:
  - rubocop-performance
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'
    - 'tmp/**/*'
    - '.bundle/**/*'
    - 'coverage/**/*'

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  EnforcedStyle: always

# Style/StringConcatenation autocorrect is unsafe for Pathname + String,
# which is the idiomatic way to build paths. Keep it disabled to avoid
# silently producing broken paths.
Style/StringConcatenation:
  Enabled: false

Layout/LineLength:
  Max: 120

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - 'Gemfile'

Metrics/MethodLength:
  Max: 40

Metrics/AbcSize:
  Max: 35

Metrics/CyclomaticComplexity:
  Max: 12

Metrics/PerceivedComplexity:
  Max: 12

Metrics/ParameterLists:
  Max: 8
  # Keyword arguments are self-documenting at the call site, so a long
  # keyword-only signature (e.g. Owl::Subagents::Api.spawn) does not carry the
  # positional-order ambiguity this cop guards against. Count positional
  # parameters only; the positional Max above still applies.
  CountKeywordArgs: false

Metrics/ClassLength:
  Max: 200

Metrics/ModuleLength:
  Max: 200

RSpec/NestedGroups:
  Max: 4

RSpec/DescribeClass:
  Enabled: false

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/AnyInstance:
  Enabled: false

# --- Spec-only relaxations -------------------------------------------------
# These cops encode test-style preferences that fight the structural,
# fixture-heavy unit tests in this suite. They are relaxed ONLY for `spec/**`;
# production code under `lib/` is held to the full ruleset (offenses there are
# fixed by code, never silenced here).

# Structural specs walk a fixture through several assertions in one example;
# splitting them would obscure the scenario rather than clarify it.
RSpec/ExampleLength:
  Exclude:
    - 'spec/**/*'
RSpec/MultipleExpectations:
  Exclude:
    - 'spec/**/*'

# Some integration-style specs legitimately wire up many memoized helpers
# (root, config, workflow, task fixtures) to set up one scenario.
RSpec/MultipleMemoizedHelpers:
  Exclude:
    - 'spec/**/*'

# A few specs share fixture state across a context via an instance variable set
# in a before hook; converting every one to let would not improve clarity.
RSpec/InstanceVariable:
  Exclude:
    - 'spec/**/*'

# Specs build anonymous backend/fixture classes and named constants inline to
# assert behavior; stubbing every constant would add ceremony without value.
RSpec/LeakyConstantDeclaration:
  Exclude:
    - 'spec/**/*'
RSpec/LeakyLocalVariable:
  Exclude:
    - 'spec/**/*'
Lint/ConstantDefinitionInBlock:
  Exclude:
    - 'spec/**/*'

# Context descriptions in this suite read as scenario statements ("full run
# enforces ...") rather than the when/with/without prefixes the cop expects.
RSpec/ContextWording:
  Exclude:
    - 'spec/**/*'

# Test doubles implement production interface signatures (e.g.
# read_step_context(source_dir:, step_id:, relative_path:)) and legitimately
# ignore some keyword arguments; renaming them would break the contract.
Lint/UnusedMethodArgument:
  Exclude:
    - 'spec/**/*'
