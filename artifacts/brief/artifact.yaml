id: brief
title: Brief
kind: markdown
description: Краткое описание фичи — контекст, цель, критерии готовности.
default_template: templates/default.md

front_matter:
  type: object
  required: [status, summary]
  properties:
    status:
      type: string
      enum: [draft, approved]
    summary:
      type: string

validation:
  required_sections:
    - Контекст
    - Цель
    - Acceptance criteria
