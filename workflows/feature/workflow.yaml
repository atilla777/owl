id: feature
kind: task
title: Feature
description: Default workflow for a single feature.
execution_mode: autonomous_after_brief

artifacts:
  brief:
    type: brief
    storage:
      role: tasks
      path: "{{task.id}}/brief.md"
  design:
    type: design
    optional: true
    storage:
      role: tasks
      path: "{{task.id}}/design.md"
  plan:
    type: plan
    storage:
      role: tasks
      path: "{{task.id}}/plan.md"
  review:
    type: review
    storage:
      role: tasks
      path: "{{task.id}}/review.md"
  verification:
    type: verification
    storage:
      role: tasks
      path: "{{task.id}}/verification.md"

publishes:
  - from: "{{task.id}}/design.md"
    to: "{{task.id}}/design.md"

steps:
  - id: brief
    skill: owl-step-run
    interactive: true
    creates: [brief]
    default_variant: feature
    variants:
      feature:
        context_file: brief.feature.context.md
        title: "Collect feature requirements"
      root_cause:
        context_file: brief.root_cause.context.md
        title: "Find bug root cause"
      problem_inventory:
        context_file: brief.problem_inventory.context.md
        title: "Inventory refactor problems"
  - id: design
    skill: owl-step-run
    context_file: design.context.md
    interactive: true
    requires: [brief]
    creates: [design]
  - id: plan
    skill: owl-step-run
    context_file: plan.context.md
    requires: [brief]
    creates: [plan]
  - id: implement
    skill: owl-step-run
    context_file: implement.context.md
    requires: [plan]
    creates: [verification]
  - id: review_code
    skill: owl-step-run
    context_file: review_code.context.md
    requires: [implement]
    creates: [review]
  - id: merge_docs
    skill: owl-step-run
    context_file: merge_docs.context.md
    requires: [review_code]
  - id: archive
    skill: owl-step-run
    context_file: archive.context.md
    requires: [merge_docs]
  - id: commit_push
    skill: owl-step-run
    context_file: commit_push.context.md
    requires: [archive]
