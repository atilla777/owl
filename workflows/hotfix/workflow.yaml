id: hotfix
kind: task
title: Hotfix
description: Workflow для срочных продакшен-фиксов.

artifacts:
  issue:
    type: issue
    storage:
      role: tasks
      path: "{{task.id}}/issue.md"
  patch_plan:
    type: patch_plan
    storage:
      role: tasks
      path: "{{task.id}}/patch_plan.md"
  tasks:
    type: tasks
    storage:
      role: tasks
      path: "{{task.id}}/tasks.md"
  verification:
    type: verification
    storage:
      role: tasks
      path: "{{task.id}}/verification.md"

steps:
  - id: issue
    skill: owl-step-run
    context_file: issue.context.md
    creates: [issue]
  - id: patch_plan
    skill: owl-step-run
    context_file: patch_plan.context.md
    requires: [issue]
    creates: [patch_plan]
  - id: tasks
    skill: owl-step-run
    context_file: tasks.context.md
    requires: [patch_plan]
    creates: [tasks]
  - id: apply
    skill: owl-step-run
    context_file: apply.context.md
    requires: [tasks]
  - id: verify
    skill: owl-step-run
    context_file: verify.context.md
    requires: [apply]
    creates: [verification]
  - id: archive
    skill: owl-step-run
    context_file: archive.context.md
    requires: [verify]
