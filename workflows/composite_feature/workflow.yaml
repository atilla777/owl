id: composite_feature
kind: composite_task
title: Composite feature
description: Workflow for a large feature that decomposes into child tasks.
execution_mode: autonomous_after_brief

artifacts:
  brief:
    type: brief
    storage:
      role: tasks
      path: "{{task.id}}/brief.md"
  design:
    type: design
    optional: true
    storage:
      role: tasks
      path: "{{task.id}}/design.md"
  decomposition:
    type: decomposition
    storage:
      role: tasks
      path: "{{task.id}}/decomposition.md"
  verification:
    type: verification
    storage:
      role: tasks
      path: "{{task.id}}/verification.md"

publishes:
  - from: "{{task.id}}/design.md"
    to: "{{task.id}}/design.md"

steps:
  - id: brief
    skill: owl-step-run
    context_file: brief.context.md
    interactive: true
    creates: [brief]
  - id: design
    skill: owl-step-run
    context_file: design.context.md
    interactive: true
    requires: [brief]
    creates: [design]
  - id: decompose
    skill: owl-step-run
    context_file: decompose.context.md
    interactive: true
    requires: [brief]
    creates: [decomposition]
  - id: coordinate
    skill: owl-step-run
    context_file: coordinate.context.md
    requires: [decompose]
  - id: aggregate_verify
    skill: owl-step-run
    context_file: aggregate_verify.context.md
    requires: [coordinate]
    creates: [verification]
  - id: merge_docs
    skill: owl-step-run
    context_file: merge_docs.context.md
    requires: [aggregate_verify]
  - id: archive
    skill: owl-step-run
    context_file: archive.context.md
    requires: [merge_docs]
  - id: commit_push
    skill: owl-step-run
    context_file: commit_push.context.md
    requires: [archive]
