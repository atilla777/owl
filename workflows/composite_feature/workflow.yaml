id: composite_feature
kind: composite_task
title: Composite feature
description: Workflow для крупной фичи с декомпозицией на child tasks.

artifacts:
  brief:
    type: brief
    storage:
      role: tasks
      path: "{{task.id}}/brief.md"
  spec:
    type: spec
    storage:
      role: tasks
      path: "{{task.id}}/spec.md"
  design:
    type: design
    optional: true
    storage:
      role: tasks
      path: "{{task.id}}/design.md"
  decomposition:
    type: decomposition
    storage:
      role: tasks
      path: "{{task.id}}/decomposition.md"
  verification:
    type: verification
    storage:
      role: tasks
      path: "{{task.id}}/verification.md"

publishes:
  - from: "{{task.id}}/spec.md"
    to: "{{task.id}}/spec.md"

steps:
  - id: brief
    skill: owl-step-run
    context_file: brief.context.md
    creates: [brief]
  - id: specify
    skill: owl-step-run
    context_file: specify.context.md
    requires: [brief]
    creates: [spec]
  - id: design
    skill: owl-step-run
    context_file: design.context.md
    requires: [specify]
    creates: [design]
  - id: decompose
    skill: owl-step-run
    context_file: decompose.context.md
    requires: [specify]
    creates: [decomposition]
  - id: coordinate
    skill: owl-step-run
    context_file: coordinate.context.md
    requires: [decompose]
  - id: aggregate_verify
    skill: owl-step-run
    context_file: aggregate_verify.context.md
    requires: [coordinate]
    creates: [verification]
  - id: publish
    skill: owl-step-run
    context_file: publish.context.md
    requires: [aggregate_verify]
  - id: archive
    skill: owl-step-run
    context_file: archive.context.md
    requires: [publish]
