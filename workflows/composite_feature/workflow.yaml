id: composite_feature
kind: composite_task
title: Composite feature
description: Workflow for a large feature decomposed into child tasks.
execution_mode: autonomous_after_brief

artifacts:
  brief:
    type: brief
    storage:
      role: tasks
      path: "{{task.id}}/brief.md"
  design:
    type: design
    optional: true
    storage:
      role: tasks
      path: "{{task.id}}/design.md"
  decomposition:
    type: decomposition
    storage:
      role: tasks
      path: "{{task.id}}/decomposition.md"
  review:
    type: review
    storage:
      role: tasks
      path: "{{task.id}}/review.md"

steps:
  - id: brief
    skill: owl-step-run
    context_file: brief.context.md
    interactive: true
    creates: [brief]
  - id: design
    skill: owl-step-run
    context_file: design.context.md
    interactive: true
    requires: [brief]
    creates: [design]
  - id: decompose
    skill: owl-step-run
    context_file: decompose.context.md
    interactive: true
    requires: [brief]
    creates: [decomposition]
  - id: review
    skill: owl-step-run
    context_file: review.context.md
    requires: [decompose]
    creates: [review]
  - id: archive
    skill: owl-step-run
    context_file: archive.context.md
    requires: [review]
  - id: commit_push
    skill: owl-step-run
    context_file: commit_push.context.md
    requires: [archive]
