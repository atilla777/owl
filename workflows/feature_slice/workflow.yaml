id: feature_slice
kind: task
title: Feature slice
description: Minimal child workflow inside a composite feature.
execution_mode: autonomous

artifacts:
  plan:
    type: plan
    storage:
      role: tasks
      path: "{{task.id}}/plan.md"
  verification:
    type: verification
    storage:
      role: tasks
      path: "{{task.id}}/verification.md"
  review:
    type: review
    storage:
      role: tasks
      path: "{{task.id}}/review.md"

steps:
  - id: plan
    skill: owl-step-run
    context_file: plan.context.md
    creates: [plan]
  - id: implement
    skill: owl-step-run
    context_file: implement.context.md
    requires: [plan]
    creates: [verification]
  - id: review_code
    skill: owl-step-run
    context_file: review_code.context.md
    requires: [implement]
    creates: [review]
