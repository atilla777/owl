---
id: hotfix
kind: task
title: Hotfix
description: >-
  Lean workflow for an urgent fix: brief (root cause) -> implement -> review ->
  commit_push. No design/plan/merge_docs/archive — the brief's root-cause
  findings are the spec and the fix ships straight after a self-review. Use
  `feature` when the change needs design, planning, or doc publishing.
execution_mode: autonomous_after_brief
artifacts:
  brief:
    type: brief
    storage:
      role: tasks
      path: "{{task.id}}/brief.md"
  review:
    type: review
    storage:
      role: tasks
      path: "{{task.id}}/review.md"
  verification:
    type: verification
    storage:
      role: tasks
      path: "{{task.id}}/verification.md"
steps:
- id: brief
  skill: owl-step-discussion
  session_type: discussion
  tier: advanced
  creates:
  - brief
  default_variant: root_cause
  variants:
    feature:
      context_file: brief.feature.context.md
      title: Collect feature requirements
    root_cause:
      context_file: brief.root_cause.context.md
      title: Find bug root cause
    problem_inventory:
      context_file: brief.problem_inventory.context.md
      title: Inventory refactor problems
- id: implement
  skill: owl-step-execution
  session_type: execution
  tier: advanced
  context_file: implement.context.md
  requires:
  - brief
  creates:
  - verification
- id: review_code
  skill: owl-step-execution
  session_type: execution
  tier: advanced
  context_file: review_code.context.md
  requires:
  - implement
  creates:
  - review
- id: commit_push
  skill: owl-step-execution
  session_type: execution
  tier: standard
  context_file: commit_push.context.md
  requires:
  - review_code
