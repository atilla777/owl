id: review
title: Code review
kind: markdown
description: Self-review findings and their resolution after the implement step.
default_template: templates/default.md

front_matter:
  type: object
  required: [status, summary]
  properties:
    status:
      type: string
      enum: [open, resolved]
    summary:
      type: string
    # Optional (not required) — validated only if present, so existing reviews
    # stay valid. A project wanting them required clones review.
    verdict:
      type: string
      enum: [accepted, accepted_with_followups, changes_required]
    ready:
      type: boolean

validation:
  required_sections:
    - Summary
    - Findings
    - Resolution
    - name: Remediation
      level: warning
    - name: Residual risks
      level: warning
