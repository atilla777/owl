id: review
title: Code review
kind: markdown
description: Self-review findings and their resolution after the implement step.
default_template: templates/default.md

front_matter:
  type: object
  required: [status, summary]
  properties:
    status:
      type: string
      enum: [open, resolved]
    summary:
      type: string

validation:
  required_sections:
    - Summary
    - Findings
    - Resolution
