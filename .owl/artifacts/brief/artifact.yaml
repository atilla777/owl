id: brief
title: Brief
kind: markdown
description: Task brief — problem, goal, user scenarios, edge cases, acceptance criteria.
default_template: templates/default.md

front_matter:
  type: object
  required: [status, summary]
  properties:
    status:
      type: string
      enum: [draft, approved]
    summary:
      type: string

validation:
  required_sections:
    - Problem
    - Goal
    - Scenarios
    - Edge cases
    - Acceptance criteria
  required_patterns:
    - pattern: '(?m)^###\s+Requirement:'
      type: regex
      level: error
      description: >-
        Brief must define at least one formal "### Requirement:" heading
        (see the Requirement/Scenario grammar in
        docs/agents/31_Owl_Requirement_Scenario_grammar.md).
  require_scenarios: true
  require_when_then: true
