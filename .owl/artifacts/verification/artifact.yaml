id: verification
title: Verification report
kind: markdown
description: Verification report — commands run, outcomes, and any issues found.
default_template: templates/default.md

front_matter:
  type: object
  required: [status, summary]
  properties:
    status:
      type: string
      enum: [passed, failed, partial]
    summary:
      type: string
    partial_reason:
      type: string

validation:
  required_sections:
    - Summary
    - Commands
    - Outcomes
